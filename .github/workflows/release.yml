# workflow_dispatch 로 수동 실행 → 테스트 → Windows 빌드 → GitHub Release
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "릴리스 버전 (비우면 config.APP_VERSION 사용, 예: 0.0.1)"
        required: false
        type: string
      create_github_release:
        description: "baggychani/Korean_Edu_Voca_Check 에 Release·바이너리 업로드"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kvocab-guard

jobs:
  prepare:
    name: Version sync & validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.out.outputs.version }}
      tag: ${{ steps.out.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: out
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=$(python -c "import re; t=open('src/kvocab_core/config.py',encoding='utf-8').read(); print(re.search(r'APP_VERSION = \"([^\"]+)\"', t).group(1))")
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"

      - name: Sync version files
        run: python scripts/sync_version.py --set "${{ steps.out.outputs.version }}"

      - name: Verify version consistency
        run: python scripts/sync_version.py --check

      - name: Upload synced metadata
        uses: actions/upload-artifact@v4
        with:
          name: version-metadata
          retention-days: 7
          path: |
            kvocab-guard/src/kvocab_core/config.py
            kvocab-guard/pyproject.toml
            kvocab-guard/release/info.txt
            kvocab-guard/KVocabGuard.iss
            kvocab-guard/release/complete.txt

  test:
    name: Tests
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Install Qt runtime (headless Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0
      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -q

  build-windows:
    name: Windows (Setup + portable + publish)
    needs: [prepare, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download synced version files
        uses: actions/download-artifact@v4
        with:
          name: version-metadata
          path: kvocab-guard

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]" pyinstaller

      - name: Rebuild app icon
        shell: pwsh
        run: |
          if (Test-Path "assets/logo_source.png") {
            python scripts/rebuild_icon.py
          } else {
            Write-Host "logo_source.png not found; using committed app_icon assets"
          }

      - name: PyInstaller (onedir)
        shell: pwsh
        working-directory: kvocab-guard
        run: |
          pyinstaller --noconfirm --windowed `
            --icon=src/kvocab_desktop/assets/app_icon.ico `
            --name=KVocabGuard `
            --version-file=release/info.txt `
            --collect-all kiwipiepy `
            --collect-all kiwipiepy_model `
            --add-data "data/seed;data/seed" `
            --add-data "src/kvocab_desktop/assets;kvocab_desktop/assets" `
            --paths src `
            src/kvocab_desktop/app.py
          if (-not (Test-Path "dist\KVocabGuard\KVocabGuard.exe")) {
            throw "PyInstaller output not found"
          }

      - name: Smoke test packaged app
        shell: pwsh
        working-directory: kvocab-guard
        run: |
          $exe = "$PWD\dist\KVocabGuard\KVocabGuard.exe"
          & $exe --smoke-analyze
          if ($LASTEXITCODE -ne 0) {
            throw "Packaged Kiwi smoke test failed with code $LASTEXITCODE"
          }
          $p = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 5
          if ($p.HasExited) {
            throw "Packaged app exited during smoke test with code $($p.ExitCode)"
          }
          Stop-Process -Id $p.Id -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        working-directory: kvocab-guard
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found: $iscc" }
          & $iscc "/DMyOutputDir=$PWD\release" "KVocabGuard.iss"
          $setup = Get-ChildItem -Path release -Filter "KVocabGuard_v${env:VERSION}_Setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "Setup exe not found under release\" }
          Write-Host "Built installer: $($setup.FullName)"

      - name: Zip portable onedir
        shell: pwsh
        working-directory: kvocab-guard
        run: |
          Compress-Archive -Path "dist\KVocabGuard\*" `
            -DestinationPath "KVocabGuard-windows-x64-portable-v${{ needs.prepare.outputs.version }}.zip" -Force

      - name: Verify release files
        shell: pwsh
        working-directory: kvocab-guard
        run: |
          $setup = Get-ChildItem -Path release -Filter "KVocabGuard_v*_Setup.exe"
          $zip = Get-ChildItem -Path . -Filter "KVocabGuard-windows-x64-portable-v*.zip"
          if (-not $setup) { throw "Setup exe missing" }
          if (-not $zip) { throw "Portable zip missing" }
          Write-Host "Release files:"
          $setup | ForEach-Object { Write-Host "  $($_.FullName)" }
          $zip | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Create GitHub Release
        if: inputs.create_github_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: 한국어교육 단어 검사기 ${{ needs.prepare.outputs.version }}
          body_path: README.md
          generate_release_notes: false
          files: |
            kvocab-guard/release/KVocabGuard_v*_Setup.exe
            kvocab-guard/KVocabGuard-windows-x64-portable-v*.zip
          fail_on_unmatched_files: true
